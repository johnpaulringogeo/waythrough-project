const results = [];
let done = 0;

async function checkUrl(url) {
  try {
    const controller = new AbortController();
    const tid = setTimeout(() => controller.abort(), 12000);
    const r = await fetch(url, { method: 'HEAD', redirect: 'follow', signal: controller.signal });
    clearTimeout(tid);
    return { url, status: r.status, finalUrl: r.url, ok: r.ok, redirected: r.redirected };
  } catch(e1) {
    try {
      const controller2 = new AbortController();
      const tid2 = setTimeout(() => controller2.abort(), 12000);
      const r2 = await fetch(url, { redirect: 'follow', signal: controller2.signal });
      clearTimeout(tid2);
      return { url, status: r2.status, finalUrl: r2.url, ok: r2.ok, redirected: r2.redirected };
    } catch(e2) {
      return { url, status: 0, error: e2.message, ok: false };
    }
  }
}

async function run() {
  for (let i = 0; i < urls.length; i += 5) {
    const batch = urls.slice(i, i+5);
    const br = await Promise.all(batch.map(checkUrl));
    results.push(...br);
    done += br.length;
    document.getElementById('status').textContent = `Checked ${done}/${urls.length}`;
  }
  document.getElementById('status').textContent = `DONE: ${done}/${urls.length}`;
  window._linkResults = results;
  document.getElementById('output').textContent = JSON.stringify(results, null, 2);
}
